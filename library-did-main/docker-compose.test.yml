# 테스트 환경 - 프로덕션(3000/80)과 충돌 없이 별도 실행
# 사용법: docker-compose -f docker-compose.test.yml up --build -d

services:
  redis-test:
    image: redis:7-alpine
    container_name: did-test-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme-redis-pw}
    volumes:
      - redis_test_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme-redis-pw}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend-test:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: did-test-backend
    ports:
      - "3010:3000"   # 호스트 3010 → 컨테이너 3000
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_HOST=redis-test
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme-redis-pw}
      - JWT_SECRET=${JWT_SECRET}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET}
      - STORAGE_TYPE=${STORAGE_TYPE:-local}
      - STORAGE_PATH=./storage/videos
      - GCS_BUCKET=${GCS_BUCKET:-}
      - NAVER_CLIENT_ID=${NAVER_CLIENT_ID:-}
      - NAVER_CLIENT_SECRET=${NAVER_CLIENT_SECRET:-}
      - ALPAS_USE_MOCK=${ALPAS_USE_MOCK:-true}
      - ALPAS_API_URL=${ALPAS_API_URL:-}
      - ALPAS_API_KEY=${ALPAS_API_KEY:-}
      - ALPAS_LIB_NO=${ALPAS_LIB_NO:-}
      - ALPAS_MANAGE_CODE=${ALPAS_MANAGE_CODE:-}
      - ALPAS_NETWORK_ADAPTER_ID=${ALPAS_NETWORK_ADAPTER_ID:-}
      - GCS_PUBLIC_BASE_URL=${GCS_PUBLIC_BASE_URL:-}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    depends_on:
      redis-test:
        condition: service_healthy
    volumes:
      - video_test_storage:/app/storage
      - db_test_data:/app/prisma
    restart: unless-stopped

  worker-test:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: did-test-worker
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis-test
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme-redis-pw}
      - BACKEND_URL=http://backend-test:3000
      - STORAGE_TYPE=${STORAGE_TYPE:-local}
      - STORAGE_PATH=./storage/videos
      - GCS_BUCKET=${GCS_BUCKET:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - NAVER_CLIENT_ID=${NAVER_CLIENT_ID:-}
      - NAVER_CLIENT_SECRET=${NAVER_CLIENT_SECRET:-}
      - ALADIN_TTB_KEY=${ALADIN_TTB_KEY:-}
      - DATA4LIBRARY_AUTH_KEY=${DATA4LIBRARY_AUTH_KEY:-}
      - V8_SCRIPT_PATH=/app/video-engine-v8/generate_book_trailer.py
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-1}
    depends_on:
      redis-test:
        condition: service_healthy
      backend-test:
        condition: service_started
    volumes:
      - video_test_storage:/app/storage
    restart: unless-stopped

  frontend-test:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_BASE_PATH=
        - VITE_API_URL=/api
    container_name: did-test-frontend
    ports:
      - "8080:80"   # 호스트 8080 → 컨테이너 80
    depends_on:
      - backend-test
    restart: unless-stopped

volumes:
  redis_test_data:
  video_test_storage:
  db_test_data:
