services:
  redis:
    image: redis:7-alpine
    # ports:
    #   - "6379:6379"  # 외부 노출 불필요 (컨테이너 내부 통신만 사용)
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-your-secret-key}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-internal-secret}
      - STORAGE_TYPE=${STORAGE_TYPE:-local}
      - STORAGE_PATH=./storage/videos
      - GCS_BUCKET=${GCS_BUCKET:-}
      - NAVER_CLIENT_ID=${NAVER_CLIENT_ID:-}
      - NAVER_CLIENT_SECRET=${NAVER_CLIENT_SECRET:-}
      - ALPAS_USE_MOCK=${ALPAS_USE_MOCK:-true}
      - ALPAS_API_URL=${ALPAS_API_URL:-}
      - ALPAS_API_KEY=${ALPAS_API_KEY:-}
      - ALPAS_LIB_NO=${ALPAS_LIB_NO:-}
      - ALPAS_MANAGE_CODE=${ALPAS_MANAGE_CODE:-}
      - ALPAS_NETWORK_ADAPTER_ID=${ALPAS_NETWORK_ADAPTER_ID:-}
      - GCS_PUBLIC_BASE_URL=${GCS_PUBLIC_BASE_URL:-}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme123}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - video_storage:/app/storage
      - db_data:/app/prisma
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - BACKEND_URL=http://backend:3000
      - STORAGE_TYPE=${STORAGE_TYPE:-local}
      - STORAGE_PATH=./storage/videos
      - GCS_BUCKET=${GCS_BUCKET:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - NAVER_CLIENT_ID=${NAVER_CLIENT_ID:-}
      - NAVER_CLIENT_SECRET=${NAVER_CLIENT_SECRET:-}
      - VEO_API_KEY=${VEO_API_KEY:-}
      - VEO_API_ENDPOINT=${VEO_API_ENDPOINT:-}
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-2}
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - video_storage:/app/storage
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_BASE_PATH=
        - VITE_API_URL=/api
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis_data:
  video_storage:
  db_data:
